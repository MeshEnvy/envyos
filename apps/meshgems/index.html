<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeshTunes</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎶</text></svg>"
    />
    <style>
      :root {
        --bg: #101318;
        --panel: #171b22;
        --panel-2: #1d222b;
        --border: #272d38;
        --text: #e8ecf2;
        --text-dim: #8b94a3;
        --accent: #4a90e2;
        --accent-bright: #5ba0f2;
        --warn: #e6a817;
        --danger: #ff6b6b;
        --cell-bg: #12151b;
        --cell-beat: #171b23;
        --cell-guide: #151a24;
        --cell-hover: #2a3140;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: var(--bg);
        color: var(--text);
      }

      .limit-bar-wrap {
        position: sticky;
        top: 0;
        z-index: 100;
        height: 5px;
        background: #232833;
      }

      .limit-bar-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition:
          width 0.15s ease,
          background 0.15s ease;
      }

      .limit-bar-fill.warn {
        background: var(--warn);
      }

      .limit-bar-fill.over {
        background: var(--danger);
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px 24px 32px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      header h1 {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .logo-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--accent-bright);
        font-size: 16px;
        line-height: 1;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(74, 144, 226, 0.45);
      }

      header .tagline {
        color: var(--text-dim);
        font-size: 12px;
      }

      .pill {
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 99px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        transition:
          color 0.15s ease,
          border-color 0.15s ease;
      }

      .pill strong {
        color: var(--text);
        font-weight: 600;
      }

      .pill.warn {
        border-color: var(--warn);
      }

      .pill.warn strong {
        color: var(--warn);
      }

      .pill.over {
        border-color: var(--danger);
      }

      .pill.over strong {
        color: var(--danger);
      }

      .controls {
        margin-bottom: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .left-controls,
      .right-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        padding: 7px 14px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 7px;
        transition:
          background 0.12s ease,
          border-color 0.12s ease;
      }

      button:hover {
        background: var(--panel-2);
        border-color: #333b49;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
        min-width: 92px;
        justify-content: center;
      }

      button.primary:hover {
        background: var(--accent-bright);
        border-color: var(--accent-bright);
      }

      button.primary.playing {
        background: var(--danger);
        border-color: var(--danger);
      }

      button svg {
        display: block;
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      button.icon-btn {
        padding: 7px 9px;
      }

      button.icon-btn svg {
        width: 16px;
        height: 16px;
      }

      .grid-wrap {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: var(--border);
      }

      .playhead-ruler {
        display: grid;
        grid-template-columns: repeat(64, 1fr);
        gap: 1px;
        padding: 1px 1px 0;
        background: var(--border);
      }

      .playhead-tick {
        height: 8px;
        background: #232833;
        cursor: pointer;
        transition: background 0.1s ease;
      }

      .playhead-tick:hover {
        background: #3a4252;
      }

      .playhead-tick.active {
        background: var(--danger);
      }

      .playhead-tick.sweep {
        background: var(--accent-bright);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(64, 1fr);
        gap: 1px;
        user-select: none;
        -webkit-user-select: none;
      }

      .cell {
        aspect-ratio: 1;
        background: var(--cell-bg);
        cursor: pointer;
      }

      .cell.beat {
        background: var(--cell-beat);
      }

      .cell.guide {
        background: var(--cell-guide);
      }

      .cell:hover {
        background: var(--cell-hover);
      }

      .cell.sweep {
        background: #202636;
      }

      .cell.playhead-col {
        box-shadow: inset 2px 0 0 rgba(255, 107, 107, 0.55);
      }

      .cell.note {
        background: var(--accent);
        border-radius: 2px;
      }

      .cell.note.hold-start {
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }

      .cell.note.hold-mid,
      .cell.note.hold-tail {
        border-radius: 0;
        box-shadow: -2px 0 0 var(--accent);
        margin-left: -1px;
        position: relative;
        z-index: 1;
      }

      .cell.note.hold-tail {
        border-top-right-radius: 2px;
        border-bottom-right-radius: 2px;
      }

      .cell.drag-preview {
        background: rgba(74, 144, 226, 0.35);
        box-shadow: inset 0 0 0 1px var(--accent-bright);
      }

      .cell.drag-preview.note {
        background: var(--accent-bright);
        opacity: 0.85;
      }

      .cell.note:hover {
        background: var(--accent-bright);
      }

      .cell.note.throbbing {
        background: var(--danger);
      }

      .empty-hint {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-dim);
        font-size: 13px;
        pointer-events: none;
        background: rgba(16, 19, 24, 0.35);
      }

      footer {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        color: #5d6675;
        font-size: 11px;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-content {
        background: var(--panel);
        color: var(--text);
        padding: 20px;
        border-radius: 10px;
        max-width: 560px;
        width: 90%;
        border: 1px solid var(--border);
      }

      .modal-content h3 {
        font-size: 15px;
        margin-bottom: 4px;
      }

      .modal-content textarea {
        width: 100%;
        margin: 12px 0;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: inherit;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        resize: vertical;
      }

      .modal-content textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <div
      class="limit-bar-wrap"
      id="limitBarWrap"
      title="Public channel limit (143 bytes UTF-8)"
    >
      <div class="limit-bar-fill" id="limitBarFill"></div>
    </div>
    <div class="container">
      <header>
        <div>
          <h1>
            <span class="logo-badge" aria-hidden="true">🎶</span>MeshTunes
          </h1>
          <div class="tagline">Compose buzzer songs for MeshCore</div>
        </div>
        <span
          class="pill"
          id="byteBudget"
          title="Bytes used of the 143-byte public channel budget"
          ><strong>0</strong> / 143 bytes</span
        >
      </header>

      <div class="controls">
        <div class="left-controls">
          <button id="playStopBtn" type="button" class="primary">
            <svg
              id="playIcon"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg
              id="stopIcon"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
              style="display: none"
            >
              <rect x="6" y="6" width="12" height="12" rx="1" />
            </svg>
            <span id="playStopText">Play</span>
          </button>
        </div>
        <div class="right-controls">
          <button
            id="shareBtn"
            type="button"
            class="icon-btn"
            title="Copy message"
            aria-label="Copy message"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              />
            </svg>
          </button>
          <button id="importBtn" type="button">Import</button>
          <button id="demoBtn" type="button">Demo</button>
          <button id="clearBtn" type="button">Clear</button>
        </div>
      </div>

      <div class="grid-wrap">
        <div class="playhead-ruler" id="playheadRuler"></div>
        <div class="grid" id="grid"></div>
        <div class="empty-hint" id="emptyHint">
          Click cells to place notes · drag horizontally for held notes
        </div>
      </div>

      <footer>
        <span
          >Space = play/stop · click ruler = loop start · click = note · drag
          = held note</span
        >
        <span>Tick: 200 ms · 64 steps · 51 semitones</span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
